name: Mirror repo to GodInReach (shallow)

on:
  push:
    branches: ['*']
    tags:     ['*']

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      # Shallow clone – only the latest commit of each branch/tag
      - name: Checkout shallow repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # shallow fetch (latest commit only)

      # Add the destination remote, embedding the PAT so the push is authenticated
      - name: Set destination remote with token
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          # GitHub uses “x-access-token” as the username; the token is the password
          AUTHED_URL="https://x-access-token:${GIT_TOKEN}@github.com/GodInReach/Hospital_Management_System.git"
          git remote add destination "$AUTHED_URL"

      # Push the shallow refs to the destination repo
      - name: Push shallow refs (mirror)
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          git push destination --mirror

      # Debug: Print GIT_TOKEN length
      - name: Print GIT_TOKEN length
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          echo "Token length: ${#GIT_TOKEN}"

      # Debug: Show constructed remote URL (redacted)
      - name: Debug destination remote
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          echo "Remote URL: https://x-access-token:${GIT_TOKEN}@github.com/GodInReach/Hospital_Management_System.git" | sed 's/x-access-token:.*/x-access-token:[REDACTED]/'
